<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eliy — 实时语音通话</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--navy-900:#1E0F3A;--navy-800:#2D1B4A;--navy-700:#3D2561;--navy-600:#4B2E78;--border:#4B2E78;--text:#FDFBFF;--text-muted:#D1C5E5;--accent:#F5C518;--accent-glow:rgba(245,197,24,0.3);--success:#34d399;--warning:#F5C518;--danger:#f87171;--info:#F5C518;--font:'Inter',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:var(--font);background:var(--navy-900);color:var(--text)}
    #app{display:flex;height:100vh}

    /* 侧边栏 */
    .sidebar{width:260px;background:var(--navy-800);border-right:1px solid var(--border);padding:1.5rem;display:flex;flex-direction:column;gap:1.2rem;overflow-y:auto}
    .logo{display:flex;align-items:center;gap:.5rem}
    .logo b{font-size:1.3rem}.logo small{font-size:.65rem;color:var(--text-muted);background:var(--navy-600);padding:.1rem .5rem;border-radius:10px}
    .phase-title{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
    .phase-step{display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;border-radius:6px;font-size:.82rem;color:var(--text-muted)}
    .phase-step .dot{width:7px;height:7px;border-radius:50%;background:var(--navy-600)}
    .phase-step.active{color:var(--accent);background:var(--accent-glow);font-weight:600}
    .phase-step.active .dot{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
    .phase-step.done{color:var(--success)}.phase-step.done .dot{background:var(--success)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    canvas#radar{max-width:100%}

    /* 主区域 */
    .main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}

    /* 背景粒子 */
    .main::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(245,197,24,.08) 0%,transparent 70%);pointer-events:none}

    /* 头像区 */
    .avatar-area{position:relative;margin-bottom:2rem}
    .avatar-ring{width:280px;height:280px;border-radius:50%;padding:4px;background:conic-gradient(var(--accent),transparent,var(--accent));animation:ring-rotate 8s linear infinite}
    @keyframes ring-rotate{to{transform:rotate(360deg)}}
    .avatar-ring.speaking{background:conic-gradient(var(--info),var(--accent),var(--info));animation-duration:3s}
    .avatar-ring.listening{background:conic-gradient(var(--success),transparent,var(--success))}
    .avatar-ring.thinking{background:conic-gradient(var(--warning),transparent,var(--warning));animation-duration:2s}
    .avatar-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--navy-800);position:relative}
    .avatar-inner img{width:100%;height:100%;object-fit:cover;object-position:center center;transition:transform .1s;image-orientation:none;transform:rotate(180deg)}
    .avatar-overlay{position:absolute;inset:0;pointer-events:none}
    .status-badge{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:.4rem;background:var(--navy-700);border:1px solid var(--border);padding:.3rem .8rem;border-radius:20px;font-size:.75rem;white-space:nowrap;z-index:10}
    .status-badge .sdot{width:8px;height:8px;border-radius:50%;background:var(--accent)}

    /* 字幕 */
    .subtitle{max-width:600px;text-align:center;font-size:1.05rem;line-height:1.7;min-height:3.4em;padding:0 1rem;color:var(--text);opacity:.9}

    /* 控制按钮 */
    .controls{display:flex;align-items:center;gap:1.5rem;margin-top:2rem;z-index:10}
    .call-btn{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;font-size:1.6rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
    .call-btn.start{background:var(--success);color:#fff;box-shadow:0 0 20px rgba(52,211,153,.3)}
    .call-btn.start:hover{transform:scale(1.08);box-shadow:0 0 30px rgba(52,211,153,.5)}
    .call-btn.end{background:var(--danger);color:#fff;box-shadow:0 0 20px rgba(248,113,113,.3)}
    .call-btn.end:hover{transform:scale(1.08)}
    
    .mode-btn{display:flex;align-items:center;gap:0.5rem;background:var(--navy-700);border:1px solid var(--border);color:var(--text);padding:.6rem 1.2rem;border-radius:8px;font-size:.85rem;cursor:pointer;transition:all .2s;font-weight:500;}
    .mode-btn:hover{background:var(--navy-600);color:var(--accent)}
    .mode-btn.active{background:var(--accent);color:var(--navy-900);border-color:var(--accent);}

    /* 声波动画 */
    .wave-bar{display:flex;align-items:center;gap:4px;height:32px;margin-top:1rem;min-width:60px;justify-content:center;}
    .wave-bar span{width:4px;border-radius:2px;background:var(--accent);transition:height 0.1s ease;}
    .wave-bar.idle span{height:4px !important;background:var(--navy-500)}
    .wave-bar.thinking span{animation:wave 1.2s ease-in-out infinite}
    .wave-bar.thinking span:nth-child(1){animation-delay:0s;height:8px}
    .wave-bar.thinking span:nth-child(2){animation-delay:.1s;height:16px}
    .wave-bar.thinking span:nth-child(3){animation-delay:.2s;height:24px}
    .wave-bar.thinking span:nth-child(4){animation-delay:.3s;height:16px}
    .wave-bar.thinking span:nth-child(5){animation-delay:.4s;height:8px}
    @keyframes wave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1.4)}}

    /* 文字聊天备用 */
    .text-panel{position:absolute;bottom:0;left:0;right:0;height:45vh;background:var(--navy-800);border-top:1px solid var(--border);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .4s cubic-bezier(0.4, 0, 0.2, 1);z-index:20;box-shadow:0 -10px 30px rgba(0,0,0,0.3);}
    .text-panel.open{transform:translateY(0)}
    .text-msgs{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}
    .text-input-row{display:flex;gap:.8rem;padding:1rem 1.5rem;border-top:1px solid var(--border);background:var(--navy-900);}
    .text-input-row input{flex:1;background:var(--navy-700);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;color:var(--text);font-family:var(--font);font-size:.9rem;outline:none;transition:border-color 0.2s;}
    .text-input-row input:focus{border-color:var(--accent);}
    .text-input-row button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 1.5rem;cursor:pointer;font-size:.9rem;font-weight:600;transition:background 0.2s;}
    .text-input-row button:hover{background:#6f7ed4;}
    .msg{max-width:85%;padding:.8rem 1rem;border-radius:12px;font-size:.9rem;line-height:1.6;animation:fadeUp .3s}
    .msg.user{align-self:flex-end;background:var(--accent);color:var(--navy-900);border-bottom-right-radius:2px;font-weight:500;}
    .msg.assistant{align-self:flex-start;background:var(--navy-700);border:1px solid var(--border);border-bottom-left-radius:2px;}
    
    /* 设置面板 - 奢华深紫金色风格 */
    .settings-panel {
      position: absolute;
      top: 4.5rem;
      right: 1.5rem;
      background: rgba(30, 15, 58, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--accent);
      padding: 1.5rem;
      border-radius: 12px;
      z-index: 30;
      display: none;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      width: 280px;
      animation: slideIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .settings-panel.open {
      display: flex;
    }
    .settings-header {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.6rem;
      margin-bottom: 0.2rem;
    }
    .settings-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .settings-status-indicator {
      font-size: 0.7rem;
      color: var(--text-muted);
      word-break: break-all;
    }
    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .setting-item label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .settings-panel select, .settings-panel input {
      background: var(--navy-900);
      border: 1px solid var(--border);
      color: white;
      padding: 0.6rem;
      border-radius: 6px;
      font-size: 0.8rem;
      width: 100%;
      outline: none;
      transition: all 0.2s ease;
    }
    .settings-panel select:focus, .settings-panel input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .settings-save-btn {
      background: var(--accent);
      color: var(--navy-900) !important;
      border: none;
      padding: 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      text-align: center;
      margin-top: 0.5rem;
    }
    .settings-save-btn:hover {
      background: #ffd700;
      transform: scale(1.02);
      box-shadow: 0 0 15px var(--accent-glow);
    }
    .settings-btn {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--navy-800);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      z-index: 20;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .settings-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    @media(max-width:768px){.sidebar{display:none}.avatar-ring{width:200px;height:200px}.settings-btn{top:1rem;right:1rem;}}
  </style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="logo"><span style="color:var(--accent);font-size:1.4rem">◆</span><b>Eliy</b><small>诊断教练</small></div>
    <div class="phase-title">投料阶段</div>
    <div id="phases">
      <div class="phase-step active" data-p="INTAKE"><span class="dot"></span>信息收集</div>
      <div class="phase-step" data-p="FRAMING"><span class="dot"></span>框架构建</div>
      <div class="phase-step" data-p="DIAGNOSIS"><span class="dot"></span>深度诊断</div>
      <div class="phase-step" data-p="PRESCRIPTION"><span class="dot"></span>处方建议</div>
      <div class="phase-step" data-p="FOLLOW_UP"><span class="dot"></span>跟踪复盘</div>
    </div>
    <div class="phase-title" style="margin-top:1rem">能力雷达</div>
    <canvas id="radar" width="220" height="220"></canvas>
  </aside>
  
  <main class="main">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-header">
        <span class="settings-title">⚙️ 配置控制台</span>
        <span class="settings-status-indicator" id="settingsStatus">未檢測到配置，使用 Edge TTS 兜底</span>
      </div>
      
      <div class="setting-item">
        <label for="llmModelSelect">大模型配置 (LLM)</label>
        <select id="llmModelSelect">
          <option value="DeepSeek">DeepSeek V4 (deepseek-chat)</option>
          <option value="DeepSeekReasoner">DeepSeek Reasoner</option>
        </select>
      </div>

      <div class="setting-item">
        <label for="voiceStyleSelect">語音風格選擇</label>
        <select id="voiceStyleSelect">
          <option value="zh-CN-YunjianNeural">專業男聲 (雲健)</option>
          <option value="zh-CN-XiaoxiaoNeural">溫暖女聲 (曉曉)</option>
          <option value="zh-CN-YunxiNeural">活潑男聲 (雲希)</option>
          <option value="zh-CN-XiaoyiNeural">溫柔女聲 (曉依)</option>
        </select>
      </div>

      <!-- 下列敏感金鑰輸入欄位只在環境變數不存在時才顯示作為備用 -->
      <div class="setting-item key-input-group" id="deepseekKeyGroup">
        <label for="deepseekKey">DeepSeek API Key 密鑰配置</label>
        <input type="password" id="deepseekKey" placeholder="輸入 sk-your-deepseek-api-key" />
      </div>
      
      <div class="setting-item key-input-group" id="googleKeyGroup">
        <label for="azureKey">Google Cloud 語音配置</label>
        <input type="password" id="azureKey" placeholder="輸入 Google API Key" />
        <input type="text" id="azureRegion" placeholder="Region (如果是 Azure)" style="margin-top: 0.4rem;" />
      </div>

      <button class="settings-save-btn" onclick="saveSettings()">保存配置</button>
    </div>

    <div class="avatar-area">
      <div class="avatar-ring" id="avatarRing">
        <div class="avatar-inner">
          <img id="avatarImg" src="./assets/eli_y_avatar.png?v=3" onerror="this.src='data:image/svg+xml,' + encodeURIComponent('<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;280&quot; height=&quot;280&quot; viewBox=&quot;0 0 280 280&quot;><defs><radialGradient id=&quot;bg&quot; cx=&quot;50%&quot; cy=&quot;40%&quot;><stop offset=&quot;0%&quot; stop-color=&quot;#2D1B4A&quot;/><stop offset=&quot;100%&quot; stop-color=&quot;#1E0F3A&quot;/></radialGradient><linearGradient id=&quot;g&quot; x1=&quot;0&quot; y1=&quot;0&quot; x2=&quot;1&quot; y2=&quot;1&quot;><stop offset=&quot;0%&quot; stop-color=&quot;#F5C518&quot;/><stop offset=&quot;100%&quot; stop-color=&quot;#FFD700&quot;/></linearGradient></defs><rect width=&quot;280&quot; height=&quot;280&quot; fill=&quot;url(#bg)&quot;/><circle cx=&quot;140&quot; cy=&quot;100&quot; r=&quot;50&quot; fill=&quot;url(#g)&quot; opacity=&quot;.15&quot;/><text x=&quot;140&quot; y=&quot;125&quot; text-anchor=&quot;middle&quot; font-family=&quot;Inter,sans-serif&quot; font-size=&quot;72&quot; font-weight=&quot;700&quot; fill=&quot;url(#g)&quot;>E</text><text x=&quot;140&quot; y=&quot;175&quot; text-anchor=&quot;middle&quot; font-family=&quot;Inter,sans-serif&quot; font-size=&quot;14&quot; fill=&quot;#F5C518&quot;>诊断教练</text></svg>')" alt="Eliy" />
          <canvas class="avatar-overlay" id="avatarOverlay" width="280" height="280"></canvas>
        </div>
      </div>
      <div class="status-badge"><span class="sdot" id="sDot"></span><span id="sText">点击开始通话</span></div>
    </div>
    
    <div class="wave-bar idle" id="waveBar">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    
    <div class="subtitle" id="subtitle"></div>
    
    <div class="controls">
      <button class="call-btn start" id="callBtn" onclick="toggleCall()">📞</button>
      <button class="mode-btn" id="modeBtn" onclick="toggleTextPanel()">💬 文字模式</button>
    </div>
    
    <div class="text-panel" id="textPanel">
      <div class="text-msgs" id="textMsgs"></div>
      <div class="text-input-row">
        <input id="textInput" placeholder="输入消息（按 Enter 发送）..." onkeydown="if(event.key==='Enter')sendText()" />
        <button onclick="sendText()">发送</button>
      </div>
    </div>
  </main>
</div>

<!-- 引入语音引擎 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
<script src="./google-tts.js"></script>
<script src="./azure-tts.js"></script>
<script src="./edge-tts.js"></script>
<script type="module">
// === 環境變數安全讀取 ===
let VITE_DEEPSEEK_API_KEY = '';
let VITE_GOOGLE_CLOUD_API_KEY = '';

try {
  // Vite 構建時會將其靜態替換。在非 Vite 環境下用 try-catch 容錯
  VITE_DEEPSEEK_API_KEY = import.meta.env.VITE_DEEPSEEK_API_KEY || '';
  VITE_GOOGLE_CLOUD_API_KEY = import.meta.env.VITE_GOOGLE_CLOUD_API_KEY || '';
} catch (e) {
  console.log('[Env] Not running under Vite or import.meta.env is undefined, fallback to local storage.');
}

// === 状态 ===
const S = { 
  calling: false, status: 'idle', phase: 'INTAKE', recognition: null, msgCount: 0,
  radar: {'获客能力':0,'转化效率':0,'交付质量':0,'客户留存':0,'团队能力':0,'财务健康':0},
};

// 专业诊断教练风格的欢迎语
const WELCOME = '你好，我是 Eliy，你的商业诊断教练。我们不聊废话，只看核心瓶颈。告诉我，你现在最迫切需要解决的商业挑战是什么？';

// === DOM ===
const $ = s => document.querySelector(s);

// === TTS 引擎初始化 ===
let edgeEngine = new EdgeTTS('zh-CN-YunjianNeural', '+0%', '-2Hz', '+0%');
let azureEngine = null;
let googleEngine = null;

async function loadSettings() {
  const llmModel = localStorage.getItem('LLM_MODEL') || 'DeepSeek';
  $('#llmModelSelect').value = llmModel;

  const voiceStyle = localStorage.getItem('VOICE_STYLE') || 'zh-CN-YunjianNeural';
  $('#voiceStyleSelect').value = voiceStyle;
  
  // 動態更新 Edge TTS 語音風格
  edgeEngine = new EdgeTTS(voiceStyle, '+0%', '-2Hz', '+0%');

  // 優先從環境變量讀取金鑰，如果不存在則從 localStorage 讀取
  const dsKey = VITE_DEEPSEEK_API_KEY || localStorage.getItem('DEEPSEEK_API_KEY') || '';
  const key = VITE_GOOGLE_CLOUD_API_KEY || localStorage.getItem('AZURE_TTS_KEY') || '';
  const region = localStorage.getItem('AZURE_TTS_REGION') || '';

  $('#deepseekKey').value = dsKey;
  $('#azureKey').value = key;
  $('#azureRegion').value = region;

  // 根據環境變量是否存在，動態隱藏/顯示前端金鑰輸入框
  if (VITE_DEEPSEEK_API_KEY) {
    $('#deepseekKeyGroup').style.display = 'none';
  } else {
    $('#deepseekKeyGroup').style.display = 'flex';
  }

  if (VITE_GOOGLE_CLOUD_API_KEY) {
    $('#googleKeyGroup').style.display = 'none';
  } else {
    $('#googleKeyGroup').style.display = 'flex';
  }

  console.log(`[LLM] 已切换大模型后端至: ${llmModel}, 語音風格: ${voiceStyle}`);

  if (key && region) {
    azureEngine = new AzureTTS(key, region);
    console.log('[TTS] 已配置 Azure Speech Services');
    updateSettingsStatus('已连接 Azure Speech', true);
  } else if (key && !region) {
    googleEngine = new GoogleTTS(key);
    console.log('[TTS] 已手动配置 Google Cloud API Key');
    updateSettingsStatus('已连接 Google Cloud', true);
  } else {
    updateSettingsStatus('未检测到配置，使用 Edge TTS 兜底', false);
  }

  // 嘗試自動讀取配置 JSON (作為最終備用)
  if (!googleEngine && !azureEngine) {
    try {
      let res = await fetch('./config/google-api-key.json').catch(() => null);
      if (!res || !res.ok) {
        res = await fetch('./config/google-speech-key.json').catch(() => null);
      }
      
      if (res && res.ok) {
        const json = await res.json();
        const apiKey = json.apiKey || json.api_key || json.API_KEY || json.key;
        
        if (apiKey) {
          googleEngine = new GoogleTTS(apiKey);
          console.log('[TTS] 成功从 json 自动加载 Google API Key');
          updateSettingsStatus('已连接 Google Cloud (API Key)', true);
        } else if (json.private_key && json.client_email) {
          googleEngine = new GoogleTTS(json);
          console.log('[TTS] 成功从 json 自动加载 Service Account 密钥，即将生成 OAuth Token');
          updateSettingsStatus('已连接 Google Cloud (Service Account)', true);
        }
      }
    } catch(e) {
      console.log('[TTS] 未找到備用配置文件，將使用 Edge TTS 兜底');
    }
  }
}

function updateSettingsStatus(msg, isSuccess) {
  const statusEl = document.querySelector('#settingsStatus');
  if(statusEl) {
    statusEl.textContent = msg;
    statusEl.style.color = isSuccess ? 'var(--success)' : 'var(--warning)';
  }
}

loadSettings();

function toggleSettings() { $('#settingsPanel').classList.toggle('open'); }
function saveSettings() {
  localStorage.setItem('LLM_MODEL', $('#llmModelSelect').value);
  localStorage.setItem('VOICE_STYLE', $('#voiceStyleSelect').value);
  
  // 只有在環境變量不存在時，才將用戶輸入的 Key 保存到 localStorage，避免污染
  if (!VITE_DEEPSEEK_API_KEY) {
    localStorage.setItem('DEEPSEEK_API_KEY', $('#deepseekKey').value.trim());
  }
  if (!VITE_GOOGLE_CLOUD_API_KEY) {
    localStorage.setItem('AZURE_TTS_KEY', $('#azureKey').value.trim());
    localStorage.setItem('AZURE_TTS_REGION', $('#azureRegion').value.trim());
  }
  
  loadSettings();
  toggleSettings();
  alert('设置已保存');
}

// === Audio Analyser (适配 realtime.ts 的 VisemeGenerator) ===
let audioContext = null;
let analyser = null;
let dataArray = null;
let visemeAnimFrame = null;
let currentAudio = null;
let isBotSpeaking = false;

function setupAudioAnalyser(audioElement) {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioContext.state === 'suspended') {
    audioContext.resume();
  }
  if (audioElement._analyserConnected) return; // 避免重复连接

  const source = audioContext.createMediaElementSource(audioElement);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.7;
  source.connect(analyser);
  analyser.connect(audioContext.destination);
  
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  audioElement._analyserConnected = true;
}

function animateViseme() {
  if (!isBotSpeaking || !analyser) {
    // 恢复默认状态
    $('#avatarImg').style.transform = 'rotate(180deg) scale(1)';
    document.querySelectorAll('.wave-bar span').forEach(b => b.style.height = '');
    return;
  }
  
  analyser.getByteFrequencyData(dataArray);
  
  // 计算频段能量 (结合 realtime.ts 逻辑)
  let sum = 0;
  for (let i = 0; i < 32; i++) sum += dataArray[i]; // 取低中频段
  const avg = sum / 32;
  
  // 头像微动 (呼吸感 + 说话幅度)
  const amplitude = Math.min(1, avg / 128);
  const img = $('#avatarImg');
  if(img) img.style.transform = `rotate(180deg) scale(${1 + amplitude * 0.08})`;
  
  // 动态更新声波条
  const bars = document.querySelectorAll('.wave-bar span');
  bars.forEach((bar, i) => {
    const val = dataArray[i * 4 + 2] || 0;
    const height = Math.max(4, (val / 255) * 32);
    bar.style.height = `${height}px`;
    bar.style.animation = 'none'; // 禁用 CSS animation
  });

  visemeAnimFrame = requestAnimationFrame(animateViseme);
}

// === 通话控制 ===
async function toggleCall(){
  if(S.calling){endCall();return}
  S.calling=true;
  $('#callBtn').className='call-btn end';$('#callBtn').textContent='🔴';
  
  setVoiceStatus('speaking');
  await streamSubtitle(WELCOME);
  
  // 语音播报完成后，开启全双工监听
  startListening();
}

function endCall(){
  S.calling=false;
  stopListening();
  interruptBot();
  $('#callBtn').className='call-btn start';$('#callBtn').textContent='📞';
  setVoiceStatus('idle');
  $('#subtitle').textContent='';
  document.querySelectorAll('.wave-bar span').forEach(b => { b.style.height = ''; b.style.animation = ''; });
}

// === 语音状态 ===
function setVoiceStatus(s){
  S.status=s;
  const ring=$('#avatarRing'),wb=$('#waveBar'),dot=$('#sDot'),txt=$('#sText');
  ring.className='avatar-ring '+(s==='idle'?'':s);
  wb.className='wave-bar '+s;
  
  // 恢复 wave-bar css 动画(如果处于 thinking 状态)
  if(s === 'thinking') {
    document.querySelectorAll('.wave-bar span').forEach(b => { b.style.height = ''; b.style.animation = ''; });
  }

  const map={
    idle:['var(--accent)','点击开始通话'],
    listening:['var(--success)','聆听中...'],
    thinking:['var(--warning)','分析中...'],
    speaking:['var(--info)','说话中']
  };
  dot.style.background=map[s][0];txt.textContent=map[s][1];
}

// === 全双工语音识别 (STT) ===
function startListening(){
  if(!S.calling)return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ setVoiceStatus('idle'); return; }
  
  if(!isBotSpeaking) setVoiceStatus('listening');
  
  const r = new SR();
  r.lang = 'zh-CN';
  r.interimResults = true;
  r.continuous = true; // 全双工：持续监听

  let silenceTimer = null;
  
  r.onresult = e => {
    const interim = Array.from(e.results).map(res=>res[0].transcript).join('');
    
    // 全双工 Barge-in (打断) 逻辑
    if (interim.trim().length > 0) {
      if (isBotSpeaking) {
        console.log('[FullDuplex] 检测到用户说话，立即打断 AI');
        interruptBot();
      }
      $('#subtitle').textContent = '🎤 ' + interim;
    }
    
    // 静音检测模拟 (如果连续监听，浏览器可能不会触发 isFinal，需手动防抖)
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => {
      if(interim.trim().length > 0 && S.calling && !isBotSpeaking) {
        // 当用户停止说话 1.5s 后，提交处理
        processInput(interim.trim());
        // 清理当前识别，强制重启以清空 transcript
        stopListening();
        startListening();
      }
    }, 1500);

    const lastResult = e.results[e.results.length - 1];
    if (lastResult.isFinal) {
      clearTimeout(silenceTimer);
      const finalTxt = lastResult[0].transcript.trim();
      if (finalTxt && S.calling && !isBotSpeaking) {
         processInput(finalTxt);
      }
    }
  };
  
  r.onend = () => {
    // 全双工模式：只要在通话中，断开就自动重启
    if(S.calling) {
      setTimeout(() => { if(S.calling) startListening(); }, 200);
    }
  };
  
  r.onerror = (e) => {
    console.warn('[STT] 识别异常:', e.error);
    if(e.error === 'not-allowed') { endCall(); alert('请允许麦克风权限以使用语音诊断。'); }
  };
  
  try {
    S.recognition = r;
    r.start();
  } catch(e) {}
}

function stopListening(){
  if(S.recognition){
    try { S.recognition.onend = null; S.recognition.stop(); } catch(e){}
    S.recognition = null;
  }
}

// === 打断 AI 说话 ===
function interruptBot() {
  isBotSpeaking = false;
  stopCurrentAudio();
  if (visemeAnimFrame) cancelAnimationFrame(visemeAnimFrame);
  if(S.calling) setVoiceStatus('listening');
}

// === 处理用户输入 ===
const CONVERSATION_HISTORY = [
  { role: 'system', content: '你是 Eliy，一个资深、犀利、专业的商业诊断教练。你的说话风格简练、一针见血，通过严谨的问题引导创业者发现业务瓶颈。你目前正在和用户进行语音/文字通话，请简短回答，每次回答不要超过 120 个字，以方便语音播报。' }
];

async function fetchDeepSeekResponse(text, modelType, apiKey) {
  CONVERSATION_HISTORY.push({ role: 'user', content: text });
  if (CONVERSATION_HISTORY.length > 11) {
    CONVERSATION_HISTORY.splice(1, CONVERSATION_HISTORY.length - 11);
  }
  const modelName = modelType === 'DeepSeekReasoner' ? 'deepseek-reasoner' : 'deepseek-chat';
  
  const response = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: modelName,
      messages: CONVERSATION_HISTORY,
      temperature: modelName === 'deepseek-reasoner' ? 1.0 : 0.7,
      max_tokens: 1024
    })
  });
  
  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`${response.status} - ${errText}`);
  }
  
  const data = await response.json();
  const reply = data.choices[0]?.message?.content || '';
  
  CONVERSATION_HISTORY.push({ role: 'assistant', content: reply });
  
  if (data.choices[0]?.message?.reasoning_content) {
    console.log(`[DeepSeek R1 深度思考过程]:\n`, data.choices[0].message.reasoning_content);
  }
  
  return reply;
}

async function processInput(text){
  if(!text.trim() || isBotSpeaking) return;
  addTextMsg('user', text);
  setVoiceStatus('thinking');
  S.msgCount++;
  
  silentCollect(text); drawRadar();
  
  let resp = '';
  const activeLlm = localStorage.getItem('LLM_MODEL') || 'DeepSeek';
  const apiKey = VITE_DEEPSEEK_API_KEY || localStorage.getItem('DEEPSEEK_API_KEY') || '';

  if ((activeLlm === 'DeepSeek' || activeLlm === 'DeepSeekReasoner') && apiKey && apiKey !== 'sk-your-deepseek-api-key-here' && apiKey.trim() !== '') {
    try {
      resp = await fetchDeepSeekResponse(text, activeLlm, apiKey);
    } catch (err) {
      console.error('DeepSeek API 调用失败:', err);
      resp = `[API 错误] 无法连接到 DeepSeek。错误详情: ${err.message || err}。已自动降级至模拟回答。\n\n` + genResponse(text);
    }
  } else {
    await sleep(600 + Math.random()*400); // 模拟网络延迟
    resp = genResponse(text);
  }
  
  addTextMsg('assistant', resp);
  
  if (S.calling) {
    setVoiceStatus('speaking');
    await streamSubtitle(resp);
  }
  
  checkPhase();
}

// === Streaming 字幕 + 真实 TTS 引擎 ===
async function streamSubtitle(text){
  const el=$('#subtitle');el.textContent='';
  isBotSpeaking = true;

  // 1. 发起 TTS 请求
  let audioPromise = null;
  if (googleEngine) {
    console.log('[TTS] 使用 Google Cloud Neural TTS');
    audioPromise = googleEngine.speak(text).catch(e => {
      console.warn('[TTS] Google 失败，降级 Edge', e);
      return playEdgeTTS(text);
    });
  } else if (azureEngine) {
    console.log('[TTS] 使用 Azure Speech Services');
    audioPromise = azureEngine.speak(text).catch(e => {
      console.warn('[TTS] Azure 失败，降级 Edge', e);
      return playEdgeTTS(text);
    });
  } else {
    console.log('[TTS] 使用 Edge TTS');
    audioPromise = playEdgeTTS(text);
  }

  // 2. 字幕逐字流式显示 (模拟 LLM 流式输出)
  let subIndex = 0;
  const subtitleInterval = setInterval(() => {
    if (!isBotSpeaking || subIndex >= text.length) {
      clearInterval(subtitleInterval);
      return;
    }
    el.textContent = text.substring(0, subIndex + 1);
    subIndex++;
  }, 50);

  // 3. 等待音频准备就绪并绑定动画
  try {
    currentAudio = await audioPromise;
    if (!isBotSpeaking) {
      // 准备期间已经被打断
      currentAudio.pause();
      return;
    }
    
    // 连接 Web Audio API 分析器进行真实口型同步
    setupAudioAnalyser(currentAudio);
    animateViseme();

    // 等待播放结束
    await new Promise(resolve => {
      currentAudio.addEventListener('ended', resolve);
      currentAudio.addEventListener('pause', resolve); // 被打断
    });
    
  } catch (err) {
    console.warn('[TTS] 播放出错', err);
    // 降级使用浏览器内置
    await speakFallback(text);
  } finally {
    isBotSpeaking = false;
    clearInterval(subtitleInterval);
    if(visemeAnimFrame) cancelAnimationFrame(visemeAnimFrame);
    if(S.calling) setVoiceStatus('listening');
  }
}

async function playEdgeTTS(text) {
  const blob = await edgeEngine.synthesize(text);
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);
  audio.playbackRate = 1.05;
  // 转换成 promise 模式并返回 audio element，由上层处理 ended
  await audio.play();
  return audio;
}

function stopCurrentAudio(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  if(window.speechSynthesis) window.speechSynthesis.cancel();
}

/** 浏览器内置 TTS 回退 */
function speakFallback(text){
  return new Promise(resolve => {
    if(!window.speechSynthesis){ resolve(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='zh-CN'; u.rate=1.0; u.pitch=0.85;
    const voices = window.speechSynthesis.getVoices();
    const maleVoice = voices.find(v => v.lang.startsWith('zh') && /male|男/i.test(v.name));
    if(maleVoice) u.voice = maleVoice;
    u.onend = resolve; u.onerror = resolve;
    window.speechSynthesis.speak(u);
  });
}

// === 响应生成（MVP 模拟逻辑） ===
function genResponse(t){
  const R={
    INTAKE:[
      `收到。你提到了「${t.substring(0,10)}...」。在深入判断前，我需要明确两点：一，目前的团队规模是多少？二，这个问题导致你们每个月损失多少营收？请用数据回答。`,
      `这是个危险的信号。但我需要量化数据才能给出精确处方。直接告诉我：目前的获客成本（CAC）是多少？转化率是多少？不要讲感觉，告诉我数字。`
    ],
    FRAMING:[`基于你的描述，我的初步框架假设是：核心瓶颈不在流量，而在后端的承接转化效率。如果你的线索利用率低于 15%，这个假设就成立。你同意这个判断方向吗？`],
    DIAGNOSIS:[`TP-Lite 模型分析显示：真正的堵点是“核心团队精力分散”，导致高优项目资源不足。置信度 80%。请你反思一下，过去一周你花在最重要目标上的时间超过 30% 了吗？`],
    PRESCRIPTION:[`针对这个问题，我的 L3 级行动处方是：今天立刻砍掉 ROI 最低的两个渠道，将预算全部压在主力渠道上，并指派专人盯防转化漏斗。能做到吗？`],
    FOLLOW_UP:[`上次的行动建议落地了吗？拿到结果了，还是遇到新的阻力了？诚实点，商业不相信借口。`]
  };
  const pool=R[S.phase]||R.INTAKE;
  return pool[Math.floor(Math.random()*pool.length)];
}

// === 投料阶段控制 ===
function checkPhase(){
  const ps=['INTAKE','FRAMING','DIAGNOSIS','PRESCRIPTION','FOLLOW_UP'];
  const i=ps.indexOf(S.phase);
  if(S.msgCount>0&&S.msgCount%3===0&&i<ps.length-1){
    S.phase=ps[i+1];
    document.querySelectorAll('.phase-step').forEach((el,j)=>{
      el.classList.remove('active','done');
      if(j<i+1)el.classList.add('done');
      if(j===i+1)el.classList.add('active');
    });
  }
}

// === 雷达图 (Silent Collect) ===
function silentCollect(t){
  if(t.length>30) S.radar['获客能力']=Math.min(1,S.radar['获客能力']+.08);
  if(/收入|营收|利润|成本|钱/.test(t)) S.radar['财务健康']=Math.min(1,S.radar['财务健康']+.15);
  if(/团队|员工|招聘|人/.test(t)) S.radar['团队能力']=Math.min(1,S.radar['团队能力']+.15);
  if(/客户|用户|留存|复购/.test(t)) S.radar['客户留存']=Math.min(1,S.radar['客户留存']+.15);
  Object.keys(S.radar).forEach(k=>{S.radar[k]=Math.min(1,S.radar[k]+Math.random()*.04)});
}

function drawRadar(){
  const c=document.getElementById('radar');if(!c)return;
  const x=c.getContext('2d'),w=c.width,h=c.height,cx=w/2,cy=h/2,r=w*.35;
  const labels=Object.keys(S.radar),vals=Object.values(S.radar),n=labels.length,st=Math.PI*2/n;
  x.clearRect(0,0,w,h);
  for(let lv=1;lv<=5;lv++){const lr=r*lv/5;x.beginPath();for(let i=0;i<=n;i++){const a=i*st-Math.PI/2,px=cx+lr*Math.cos(a),py=cy+lr*Math.sin(a);i?x.lineTo(px,py):x.moveTo(px,py)}x.closePath();x.strokeStyle='rgba(42,51,80,.5)';x.stroke()}
  x.font='10px Inter,sans-serif';x.fillStyle='#8892a8';x.textAlign='center';
  for(let i=0;i<n;i++){const a=i*st-Math.PI/2;x.fillText(labels[i],cx+(r+18)*Math.cos(a),cy+(r+18)*Math.sin(a)+4)}
  x.beginPath();for(let i=0;i<=n;i++){const a=(i%n)*st-Math.PI/2,v=vals[i%n],px=cx+r*v*Math.cos(a),py=cy+r*v*Math.sin(a);i?x.lineTo(px,py):x.moveTo(px,py)}
  x.closePath();x.fillStyle='rgba(245,197,24,.2)';x.fill();x.strokeStyle='#F5C518';x.lineWidth=2;x.stroke();
}

// === 文字模式 ===
function toggleTextPanel(){
  const panel = $('#textPanel');
  const btn = $('#modeBtn');
  panel.classList.toggle('open');
  if(panel.classList.contains('open')) {
    btn.classList.add('active');
    setTimeout(() => $('#textInput').focus(), 300);
  } else {
    btn.classList.remove('active');
  }
}

function sendText(){
  const i=$('#textInput');
  const t=i.value.trim();
  if(!t)return;
  i.value='';
  
  if (S.calling && isBotSpeaking) {
    interruptBot(); // 文字也能打断语音
  }
  processInput(t);
}

function addTextMsg(role,text){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.textContent=text;
  $('#textMsgs').appendChild(d);
  $('#textMsgs').scrollTop=$('#textMsgs').scrollHeight;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
drawRadar();

// 确保在页面加载时如果是 HTTPS 则直接请求麦克风权限
window.addEventListener('load', () => {
  if (window.location.protocol === 'https:' && navigator.mediaDevices) {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      stream.getTracks().forEach(t => t.stop());
    }).catch(() => console.warn('用户暂未授予麦克风权限'));
  }
});

window.toggleSettings = toggleSettings;
window.saveSettings = saveSettings;
window.toggleCall = toggleCall;
window.toggleTextPanel = toggleTextPanel;
window.sendText = sendText;
