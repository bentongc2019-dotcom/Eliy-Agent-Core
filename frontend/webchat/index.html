<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Eliy Agent — 商业诊断，帮助创业者看清问题、做出判断">
  <title>Eliy Agent — 商业诊断</title>
  <script>
    // 登录守卫：未登录时强制跳转至登录页
    if (!localStorage.getItem('ELIY_AUTH_TOKEN')) {
      window.location.replace('./login.html');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="sidebarOverlay" class="sidebar-overlay" aria-hidden="true"></div>

    <!-- 左侧边栏 -->
    <aside id="sidebar">
      <!-- 智能体品牌头部 -->
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-logo">◆</div>
          <div class="brand-text">
            <h2>Eliy 艾利</h2>
            <span>主体型商业智能体</span>
          </div>
        </div>
        <button class="sidebar-close-btn" id="sidebarCloseBtn" type="button" aria-label="关闭侧边栏">×</button>
      </div>

      <!-- 操作区 -->
      <div class="sidebar-actions">
        <button class="new-chat-btn" id="newChatBtn">
          <span class="btn-icon">＋</span> 新对话
        </button>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchChats" placeholder="搜索对话..." disabled>
        </div>
      </div>

      <!-- Skills 区域 -->
      <div class="skills-section">
        <h3>Skills</h3>
        <div class="skills-list">
          <div class="skill-item" id="sfocusSkillBtn" title="点击启用 S’FOCUS 协作分析">
            <span class="skill-icon">⚡</span>
            <div class="history-details">
              <span class="history-title">S'FOCUS Skill</span>
              <span class="history-time">用 S'FOCUS 澄清经营问题</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 最近对话列表 -->
      <div class="history-section">
        <h3>最近对话</h3>
        <div class="history-list" id="historyList"></div>
      </div>

      <!-- 侧边栏底部：设置与账号 -->
      <div class="sidebar-footer">
        <button class="settings-btn" id="settingsBtn" title="设置">
          <span class="footer-icon">⚙️</span>
        </button>
        <button class="theme-toggle-btn" id="themeToggleBtn" title="切换外观">
          <span id="themeIcon">🌙</span>
        </button>
        <div class="user-profile">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-info">
            <span class="user-name" id="userNameText">加载中...</span>
            <span class="user-role">账号</span>
          </div>
          <button class="logout-btn" id="logoutBtn" title="登出">🚪</button>
        </div>
      </div>
    </aside>

    <!-- 右侧主聊天区 -->
    <main id="chatMain">
      <!-- 顶部栏 -->
      <header class="chat-header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <div class="model-dropdown">
            <button class="dropdown-trigger" id="dropdownTrigger">
              <span class="model-badge">v0.3.1</span>
              <span class="model-name">Eliy Agent</span>
              <span class="dropdown-arrow">▼</span>
            </button>
            <div class="dropdown-menu" id="dropdownMenu">
              <div class="dropdown-item active">Eliy v0.3.1 (DeepSeek Flash)</div>
              <div class="dropdown-item disabled">Eliy v0.4.0 (Planning - 规划中)</div>
            </div>
          </div>
        </div>

        <div class="header-right">
          <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">连接就绪</span>
          </div>
        </div>
      </header>

      <!-- 消息列表 -->
      <div class="messages" id="messageList">
        <div class="message assistant">
          <div class="avatar">E</div>
          <div class="bubble">
            <p>你好，我是Eliy，你的主体型商业智能体。</p>
            <p>我不会给你空洞的鼓励。我会帮你看清问题、聚焦瓶颈、做出有依据的判断。</p>
            <p>先告诉我：你现在面临的最大挑战是什么？</p>
          </div>
        </div>
      </div>

      <!-- 底部输入框区域 -->
      <footer class="chat-footer">
        <div class="input-container">
          <!-- 上传文件入口 -->
          <div class="attach-container">
            <button class="attach-btn" id="attachBtn" title="上传附件（仅服务当前对话）">
              <span class="attach-icon">＋</span>
            </button>
            <input type="file" id="fileInput" style="display: none;" accept="image/*,application/pdf,text/plain">
          </div>
          
          <!-- 文本输入区 -->
          <textarea id="userInput" placeholder="给 Eliy 发送消息" rows="1"></textarea>
          
          <!-- 发送按钮 -->
          <div class="input-actions">
            <button class="send-btn" id="sendBtn" title="发送消息">
              <svg class="send-icon" viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="footer-tip">
          内测版：确认后的成果仅保留在当前会话记录中
        </div>
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
