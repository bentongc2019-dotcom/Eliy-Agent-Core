<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eliy v0.3.1-test | 极奢本地 Dev Test Console</title>
  <!-- 引入奢华 Outfit 字体 -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0d0f12 0%, #151922 100%);
      --panel-bg: rgba(22, 28, 38, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --accent-gold: #d4af37;
      --accent-gold-hover: #f3e5ab;
      --accent-emerald: #10b981;
      --accent-rose: #f43f5e;
      --glow-gold: 0 0 15px rgba(212, 175, 55, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', 'Noto Sans SC', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2.5rem;
      overflow-x: hidden;
    }

    /* 奢华毛玻璃容器 */
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.5rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-dot {
      width: 16px;
      height: 16px;
      background: var(--accent-gold);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-gold);
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(to right, #ffffff, var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      padding: 0.5rem 1rem;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--accent-emerald);
      color: var(--accent-emerald);
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* 布局 */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 2rem;
    }

    /* 左侧控制面板 */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .card {
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid var(--accent-gold);
      padding-left: 0.75rem;
    }

    /* 按钮与输入 */
    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      background: rgba(10, 12, 17, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem;
      color: #ffffff;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent-gold);
      box-shadow: var(--glow-gold);
    }

    .btn-group {
      display: flex;
      gap: 1rem;
    }

    .btn {
      flex: 1;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-gold {
      background: var(--accent-gold);
      color: #000000;
    }

    .btn-gold:hover {
      background: var(--accent-gold-hover);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
    }

    .btn-outline:hover {
      background: rgba(212, 175, 55, 0.1);
    }

    /* 安全状态 */
    .security-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .security-item:last-child {
      border-bottom: none;
    }

    .status-ok {
      color: var(--accent-emerald);
      font-weight: 600;
    }

    /* 核心规则编辑器 */
    .select-style {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(10, 12, 17, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: #ffffff;
      font-family: inherit;
      margin-bottom: 1rem;
      outline: none;
    }

    .select-style:focus {
      border-color: var(--accent-gold);
    }

    /* 右侧文件监控区 */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
      overflow-x: auto;
    }

    .tab {
      padding: 0.5rem 1rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--accent-gold);
      border-bottom-color: var(--accent-gold);
    }

    .tab:hover {
      color: #ffffff;
    }

    .code-viewer {
      width: 100%;
      height: 600px;
      background: rgba(8, 10, 15, 0.85);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      color: #a6accd;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1e293b;
      border-left: 4px solid var(--accent-gold);
      padding: 1rem 1.5rem;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      transform: translateY(150%);
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .toast.show {
      transform: translateY(0);
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-area">
      <div class="logo-dot"></div>
      <h1>Eliy v0.3.1-test 本地控制台</h1>
    </div>
    <div class="status-badge">SANDBOX RUNTIME</div>
  </header>

  <div class="grid">
    <!-- 左侧控制面板 -->
    <div class="left-panel">
      <!-- API 仿真交互区 -->
      <div class="card">
        <div class="card-title">
          <span>API 仿真交互区</span>
          <span style="font-size: 0.8rem; color: var(--text-secondary);">Local Gateway</span>
        </div>
        
        <div class="form-group">
          <label for="userMsg">模拟用户输入 (User Message)</label>
          <textarea id="userMsg" placeholder="例如：請只回復一句：Eliy runtime loop test."></textarea>
        </div>

        <div class="btn-group">
          <button class="btn btn-gold" id="btnChat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            1. Run /api/chat
          </button>
          <button class="btn btn-outline" id="btnRecord">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            2. Run /api/record
          </button>
        </div>
      </div>

      <!-- 核心规则编辑器 -->
      <div class="card">
        <div class="card-title">
          <span>核心规则配置区</span>
          <span style="color: var(--accent-gold); font-size: 0.8rem;">Auto-Backup</span>
        </div>
        
        <div class="form-group">
          <label for="ruleSelect">选择核心规则文件 (仅限以下 4 个允许编辑)</label>
          <select id="ruleSelect" class="select-style">
            <option value="memory/NEXT_CONTEXT.md">memory/NEXT_CONTEXT.md (下一交互上下文)</option>
            <option value="memory/ARTIFACT_STATUS.md">memory/ARTIFACT_STATUS.md (交付物状态)</option>
            <option value="hac/FRONTEND_AGENT_RULES.md">hac/FRONTEND_AGENT_RULES.md (前端智能体规则)</option>
            <option value="recorder/RECORDER_RULES.md">recorder/RECORDER_RULES.md (记录器规则)</option>
          </select>
          <label style="color: var(--accent-rose); font-size: 0.75rem; margin-top: -0.5rem; display: block;">
            ⚠️ HAC_AGENT_RULES.md 与 HLAMT.md 属于核心只读文件，在此禁止编辑。
          </label>
        </div>

        <div class="form-group">
          <label for="editorArea">文件编辑区</label>
          <textarea id="editorArea" style="min-height: 250px; font-family: monospace; font-size: 0.85rem; color: #c3e88d;"></textarea>
        </div>

        <button class="btn btn-gold" id="btnSave" style="width: 100%;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
          保存并自动备份 (Save with Backup)
        </button>
      </div>

      <!-- 安全确认与状态 -->
      <div class="card">
        <div class="card-title">
          <span>系统安全巡检</span>
          <span style="color: var(--accent-emerald); font-size: 0.8rem;">Secure</span>
        </div>
        <div class="security-item">
          <span>前端 Google API Key 泄露风险</span>
          <span class="status-ok">SECURE (No Leak)</span>
        </div>
        <div class="security-item">
          <span>前端 DeepSeek API Key 泄露风险</span>
          <span class="status-ok">SECURE (No Leak)</span>
        </div>
        <div class="security-item">
          <span>成功读取 NEXT_CONTEXT.md</span>
          <span class="status-ok" id="nextContextReadStatus">Yes</span>
        </div>
        <div class="security-item">
          <span>.env 安全隔离状态</span>
          <span class="status-ok">ISOLATED (Gitignored)</span>
        </div>
      </div>
    </div>

    <!-- 右侧文件监控区 -->
    <div class="right-panel">
      <div class="card" style="flex: 1; display: flex; flex-direction: column;">
        <div class="card-title">
          <span>本地闭环文件实时监控 (Kernel File Observer)</span>
        </div>
        
        <div class="tabs">
          <button class="tab active" data-file="transcripts/latest-transcript.md">latest-transcript.md</button>
          <button class="tab" data-file="memory/STATE.md">STATE.md</button>
          <button class="tab" data-file="hlamt/EVIDENCE.md">EVIDENCE.md</button>
          <button class="tab" data-file="memory/NEXT_CONTEXT.md">NEXT_CONTEXT.md</button>
          <button class="tab" data-file="memory/ARTIFACT_STATUS.md">ARTIFACT_STATUS.md</button>
        </div>

        <div class="code-viewer" id="codeViewer">加载中...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">操作成功！</div>

<script>
  let currentActiveFile = 'transcripts/latest-transcript.md';

  // 消息提示
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.borderLeftColor = isError ? 'var(--accent-rose)' : 'var(--accent-gold)';
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  // 读取文件内容
  async function loadKernelFileContent(relPath, outputId = null) {
    try {
      const res = await fetch(`/eliy-kernel/${relPath}?t=${Date.now()}`);
      if (res.ok) {
        const text = await res.text();
        if (outputId) {
          document.getElementById(outputId).value = text;
        } else {
          document.getElementById('codeViewer').innerText = text;
        }
        if (relPath === 'memory/NEXT_CONTEXT.md') {
          document.getElementById('nextContextReadStatus').innerText = text ? 'Yes' : 'No';
        }
      } else {
        if (outputId) {
          document.getElementById(outputId).value = `Error loading file ${relPath}`;
        } else {
          document.getElementById('codeViewer').innerText = `Error loading file ${relPath}`;
        }
      }
    } catch (err) {
      console.error(err);
    }
  }

  // 刷新当前选中的文件
  function refreshObserver() {
    loadKernelFileContent(currentActiveFile);
  }

  // 初始化选项卡
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', (e) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentActiveFile = tab.getAttribute('data-file');
      refreshObserver();
    });
  });

  // API Chat 仿真执行
  document.getElementById('btnChat').addEventListener('click', async () => {
    const msg = document.getElementById('userMsg').value;
    if (!msg) {
      showToast('请输入模拟用户输入！', true);
      return;
    }
    showToast('正在执行 /api/chat...');
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: msg, model: 'deepseek-chat' })
      });
      if (res.ok) {
        const data = await res.json();
        showToast('Chat 执行成功！');
        refreshObserver();
      } else {
        const err = await res.text();
        showToast(`Chat 失败: ${err}`, true);
      }
    } catch (err) {
      showToast(`网络错误: ${err.message}`, true);
    }
  });

  // API Record 仿真执行
  document.getElementById('btnRecord').addEventListener('click', async () => {
    showToast('正在执行 /api/record...');
    try {
      const res = await fetch('/api/record', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      });
      if (res.ok) {
        const data = await res.json();
        showToast('Record 成功落盘！');
        refreshObserver();
      } else {
        const err = await res.text();
        showToast(`Record 失败: ${err}`, true);
      }
    } catch (err) {
      showToast(`网络错误: ${err.message}`, true);
    }
  });

  // 切换规则文件加载
  const ruleSelect = document.getElementById('ruleSelect');
  ruleSelect.addEventListener('change', () => {
    loadKernelFileContent(ruleSelect.value, 'editorArea');
  });

  // 保存规则文件
  document.getElementById('btnSave').addEventListener('click', async () => {
    const relPath = ruleSelect.value;
    const content = document.getElementById('editorArea').value;
    showToast('正在保存并生成备份...');
    try {
      const res = await fetch('/api/save-file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filePath: relPath, content: content })
      });
      if (res.ok) {
        showToast('保存成功，已自动生成 .bak 备份！');
        refreshObserver();
      } else {
        const data = await res.json();
        showToast(`保存失败: ${data.error || '未知错误'}`, true);
      }
    } catch (err) {
      showToast(`网络错误: ${err.message}`, true);
    }
  });

  // 初始加载
  refreshObserver();
  loadKernelFileContent(ruleSelect.value, 'editorArea');
  setInterval(refreshObserver, 5000); // 每5秒自动刷新监控
</script>
</body>
</html>
